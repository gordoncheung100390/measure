<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Floor Area Manager</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        h2 {
            margin: 0;
            color: #1a1a1a;
        }
        .btn-scan {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-scan:hover { background: #005ce6; }
        .btn-scan:active { transform: scale(0.98); }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #666;
        }
        .action-link {
            color: #dc3545;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        .action-link:hover { text-decoration: underline; }
        
        .total-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            border: 1px solid #e9ecef;
        }
        .total-panel strong {
            color: #007aff;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header-actions">
        <h2>Room Measurements</h2>
        <button class="btn-scan">
            📷 Start AR Camera Scan
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Room Name</th>
                <th>Floor Type</th>
                <th>Area (Sqm)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="room-list">
            <tr>
                <td>Living Room</td>
                <td>Hardwood</td>
                <td>21.32</td>
                <td><a class="action-link">Delete</a></td>
            </tr>
            <tr>
                <td>Bedroom 1</td>
                <td>Carpet</td>
                <td>12.16</td>
                <td><a class="action-link">Delete</a></td>
            </tr>
            </tbody>
    </table>

    <div class="total-panel">
        Total Floor Area: <strong>33.48 sqm</strong>
    </div>
</div>

</body>
</html>
