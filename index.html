<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Floor Area Manager</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- DASHBOARD VIEW STYLE --- */
        #dashboard-view {
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        h2 { margin: 0; color: #1a1a1a; }
        .btn-scan {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-scan:hover { background: #005ce6; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #f8f9fa; font-weight: 600; color: #666; }
        .action-link { color: #dc3545; text-decoration: none; font-size: 14px; cursor: pointer; }
        
        .total-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            border: 1px solid #e9ecef;
        }
        .total-panel strong { color: #007aff; }
        .empty-state { text-align: center; padding: 40px 20px; color: #888; }

        /* --- CAMERA AR ENGINE STYLE --- */
        #camera-view-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            background: #000;
        }
        #camera-feed {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            z-index: 101;
        }
        #ui-layer {
            position: absolute;
            z-index: 102;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            box-sizing: border-box;
        }
        .hud {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
            pointer-events: auto;
            color: #fff;
        }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        button.ar-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button.ar-btn:disabled { background: #444; color: #888; }
        button.danger { background: #dc3545; }
        button.success { background: #4caf50; }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            z-index: 103;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: red; }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        input { width: 50px; padding: 5px; border-radius: 4px; border: none; text-align: center; color: #000; }

        /* --- UTILITY CLASSES --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="dashboard-view">
        <div class="dashboard">
            <div class="header-actions">
                <h2>Room Measurements</h2>
                <button class="btn-scan" id="btn-open-camera">📷 Start AR Camera Scan</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Room Name</th>
                        <th>Area (Sqm)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="room-list-body">
                    </tbody>
            </table>

            <div class="total-panel">
                Total Floor Area: <strong id="grand-total">0.00 sqm</strong>
            </div>
        </div>
    </div>


    <div id="camera-view-container" class="hidden">
        <video id="camera-feed" autoplay playsinline></video>
        <div id="crosshair"></div>

        <div id="ui-layer">
            <div class="hud">
                <div>
