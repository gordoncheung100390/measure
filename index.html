<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sqm Room Measurer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
        }
        #camera-view {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }
        /* The overlay canvas where points and lines are drawn */
        #ar-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }
        #ui-layer {
            position: absolute;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        .hud {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            pointer-events: auto;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background: #0056b3; }
        button.danger { background: #dc3545; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            z-index: 4;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: red;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        input {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline></video>
    <canvas id="ar-canvas"></canvas>
    <div id="crosshair"></div>

    <div id="ui-layer">
        <div class="hud">
            <div><strong>Height (meters):</strong> <input type="number" id="cam-height" value="1.5" step="0.1"></div>
            <div id="status" style="margin-top: 5px;">Points logged: 0</div>
            <div id="result" style="font-size: 18px; margin-top: 5px; color: #4caf50;"><strong>Area: 0.00 sqm</strong></div>
        </div>

        <div class="hud controls">
            <button id="btn-permission">1. Grant Gyro</button>
            <button id="btn-log" disabled>2. Log Corner</button>
            <button id="btn-clear" class="danger">Reset</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('ar-canvas');
        const ctx = canvas.getContext('2d');
        
        const btnLog = document.getElementById('btn-log');
        const btnClear = document.getElementById('btn-clear');
        const btnPermission = document.getElementById('btn-permission');
        const txtHeight = document.getElementById('cam-height');
        const txtStatus = document.getElementById('status');
        const txtResult = document.getElementById('result');

        let currentPitch = 0; // Beta
        let currentYaw = 0;   // Alpha
        let points = [];

        // Resize tracking canvas to match display size perfectly
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Start Camera Feed
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Camera access denied or unavailable: " + err));

        // 2. Request Gyroscope Permissions
        btnPermission.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') { initGyro(); }
                    }).catch(console.error);
            } else {
                initGyro(); 
            }
        });

        function initGyro() {
            window.addEventListener('deviceorientation', (e) => {
                currentYaw = (e.alpha * Math.PI) / 180;   
                currentPitch = (e.beta * Math.PI) / 180; 
                btnLog.disabled = false;
                btnPermission.style.display = 'none';
            });
            // Start the visual render engine loop
            requestAnimationFrame(renderLoop);
        }

        // 3. Log a Room Corner
        btnLog.addEventListener('click', () => {
            const h = parseFloat(txtHeight.value);
            const angleOfDepression = (Math.PI / 2) - currentPitch;
            
            if (angleOfDepression <= 0) {
                alert("Aim lower! You must point the crosshair at the floor corners.");
                return;
            }

            const distance = h * Math.tan(angleOfDepression);

            const x = distance * Math.cos(currentYaw);
            const y = distance * Math.sin(currentYaw);

            // Save math coordinates AND the alignment sensors for visual tracing
            points.push({
                x: x, 
                y: y, 
                yaw: currentYaw, 
                pitch: currentPitch
            });
            
            txtStatus.innerText = `Points logged: ${points.length}`;

            if (points.length >= 3) {
                calculateArea();
            }
        });

        // 4. Calculate Area using Shoelace Formula
        function calculateArea() {
            let area = 0;
            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                const p2 = points[(i + 1) % points.length];
                area += (p1.x * p2.y) - (p2.x * p1.y);
            }
            area = Math.abs(area / 2);
            txtResult.innerHTML = `<strong>Area: ${area.toFixed(2)} sqm</strong>`;
        }

        // 5. The Live Tracking Render Loop
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- PART A: DRAW 3D LINE OVERLAY ON CAMERA VIEW ---
            const fovX = 1.1; // Lens Field of view approximation
            const fovY = 1.1;
            let screenPoints = [];

            points.forEach(pt => {
                // Calculate angular distance between camera orientation and logged corner
                let diffYaw = pt.yaw - currentYaw;
                while (diffYaw < -Math.PI) diffYaw += Math.PI * 2;
                while (diffYaw > Math.PI) diffYaw -= Math.PI * 2;

                let diffPitch = currentPitch - pt.pitch;

                // Map to screen pixel coordinates
                const screenX = (canvas.width / 2) - (diffYaw / fovX) * canvas.width;
                const screenY = (canvas.height / 2) + (diffPitch / fovY) * canvas.height;
                
                screenPoints.push({ x: screenX, y: screenY });
            });

            // Draw connecting tracking lines
            if (screenPoints.length > 0) {
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#007aff';
                ctx.fillStyle = 'rgba(0, 122, 255, 0.2)';
                
                ctx.beginPath();
                ctx.moveTo(screenPoints[0].x, screenPoints[0].y);
                for(let i = 1; i < screenPoints.length; i++) {
                    ctx.lineTo(screenPoints[i].x, screenPoints[i].y);
                }
                
                // Traces back to the center crosshair for the active edge line
                ctx.lineTo(canvas.width / 2, canvas.height / 2); 
                ctx.stroke();

                // Draw solid points over corners
                screenPoints.forEach((pt, idx) => {
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = idx === 0 ? '#ffcc00' : '#007aff'; // Orange for start point
                    ctx.fill();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }

            // --- PART B: DRAW BLUEPRINT TOP-DOWN MINI-MAP ---
            if (points.length > 0) {
                const mapSize = 100;
                const mapPadding = 15;
                const mapX = canvas.width - mapSize - mapPadding;
                const mapY = mapPadding;

                // Background container for minimap
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.borderRadius = 8;
                ctx.fillRect(mapX, mapY, mapSize, mapSize);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(mapX, mapY, mapSize, mapSize);

                // Find scaling factor based on room limits
                let maxDist = 1;
                points.forEach(p => {
                    maxDist = Math.max(maxDist, Math.abs(p.x), Math.abs(p.y));
                });
                const scale = (mapSize / 2) / (maxDist * 1.2);
                const centerX = mapX + (mapSize / 2);
                const centerY = mapY + (mapSize / 2);

                // Draw blueprint outline lines
                ctx.beginPath();
                ctx.strokeStyle = '#4caf50';
                ctx.lineWidth = 2;
                ctx.moveTo(centerX + points[0].x * scale, centerY - points[0].y * scale);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(centerX + points[i].x * scale, centerY - points[i].y * scale);
                }
                if (points.length >= 3) {
                    ctx.closePath();
                }
                ctx.stroke();

                // Draw current standpoint indicator (you)
                ctx.beginPath();
                ctx.arc(centerX, centerY, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#dc3545';
                ctx.fill();
            }

            requestAnimationFrame(renderLoop);
        }

        // 6. Reset App
        btnClear.addEventListener('click', () => {
            points = [];
            txtStatus.innerText = "Points logged: 0";
            txtResult.innerHTML = "<strong>Area: 0.00 sqm</strong>";
        });
    </script>
</body>
</html>
