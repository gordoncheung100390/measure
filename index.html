<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sqm Room Measurer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
        }
        #camera-view {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        .hud {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            pointer-events: auto;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background: #0056b3; }
        button.danger { background: #dc3545; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            z-index: 3;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: red;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        input {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline></video>
    <div id="crosshair"></div>

    <div id="ui-layer">
        <div class="hud">
            <div><strong>Height (meters):</strong> <input type="number" id="cam-height" value="1.5" step="0.1"></div>
            <div id="status" style="margin-top: 5px;">Points logged: 0</div>
            <div id="result" style="font-size: 18px; margin-top: 5px; color: #4caf50;"><strong>Area: 0.00 sqm</strong></div>
        </div>

        <div class="hud controls">
            <button id="btn-permission">1. Grant Gyro</button>
            <button id="btn-log" disabled>2. Log Corner</button>
            <button id="btn-clear" class="danger">Reset</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const btnLog = document.getElementById('btn-log');
        const btnClear = document.getElementById('btn-clear');
        const btnPermission = document.getElementById('btn-permission');
        const txtHeight = document.getElementById('cam-height');
        const txtStatus = document.getElementById('status');
        const txtResult = document.getElementById('result');

        let currentPitch = 0; // Beta
        let currentYaw = 0;   // Alpha
        let points = [];

        // 1. Start Camera Feed
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Camera access denied or unavailable: " + err));

        // 2. Request Gyroscope Permissions (Crucial for iOS)
        btnPermission.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') { initGyro(); }
                    }).catch(console.error);
            } else {
                initGyro(); // Android/Desktop doesn't always require explicit prompt
            }
        });

        function initGyro() {
            window.addEventListener('deviceorientation', (e) => {
                // Convert degrees to radians
                currentYaw = (e.alpha * Math.PI) / 180;   // Compass direction
                currentPitch = (e.beta * Math.PI) / 180; // Tilt front/back
                btnLog.disabled = false;
                btnPermission.style.display = 'none';
            });
        }

        // 3. Log a Room Corner
        btnLog.addEventListener('click', () => {
            const h = parseFloat(txtHeight.value);
            
            // Math: Distance along floor = height * tan(90 - pitch)
            // If phone is flat, beta is 0. If upright, beta is 90.
            const angleOfDepression = (Math.PI / 2) - currentPitch;
            
            if (angleOfDepression <= 0) {
                alert("Aim lower! You must point the crosshair at the floor corners.");
                return;
            }

            const distance = h * Math.tan(angleOfDepression);

            // Convert Polar coordinates (distance, direction) to Cartesian (x, y)
            const x = distance * Math.cos(currentYaw);
            const y = distance * Math.sin(currentYaw);

            points.push({x, y});
            txtStatus.innerText = `Points logged: ${points.length}`;

            if (points.length >= 3) {
                calculateArea();
            }
        });

        // 4. Calculate Area using Shoelace Formula
        function calculateArea() {
            let area = 0;
            const j = points.length - 1;

            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                const p2 = points[(i + 1) % points.length];
                area += (p1.x * p2.y) - (p2.x * p1.y);
            }

            area = Math.abs(area / 2);
            txtResult.innerHTML = `<strong>Area: ${area.toFixed(2)} sqm</strong>`;
        }

        // 5. Reset App
        btnClear.addEventListener('click', () => {
            points = [];
            txtStatus.innerText = "Points logged: 0";
            txtResult.innerHTML = "<strong>Area: 0.00 sqm</strong>";
        });
    </script>
</body>
</html>
