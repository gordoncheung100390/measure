<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Floor Area Manager</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- DASHBOARD VIEW STYLE --- */
        #dashboard-view {
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        h2 { margin: 0; color: #1a1a1a; }
        .btn-scan {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-scan:hover { background: #005ce6; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #f8f9fa; font-weight: 600; color: #666; }
        .action-link { color: #dc3545; text-decoration: none; font-size: 14px; cursor: pointer; }
        
        .total-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            border: 1px solid #e9ecef;
        }
        .total-panel strong { color: #007aff; }
        .empty-state { text-align: center; padding: 40px 20px; color: #888; }

        /* --- CAMERA AR ENGINE STYLE --- */
        #camera-view-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            background: #000;
        }
        #camera-feed {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            z-index: 101;
        }
        #ui-layer {
            position: absolute;
            z-index: 102;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            box-sizing: border-box;
        }
        .hud {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
            pointer-events: auto;
            color: #fff;
        }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        button.ar-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button.ar-btn:disabled { background: #444; color: #888; }
        button.danger { background: #dc3545; }
        button.success { background: #4caf50; }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            z-index: 103;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: red; }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        input { width: 50px; padding: 5px; border-radius: 4px; border: none; text-align: center; }

        /* --- UTILITY CLASSES --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="dashboard-view">
        <div class="dashboard">
            <div class="header-actions">
                <h2>Room Measurements</h2>
                <button class="btn-scan" id="btn-open-camera">📷 Start AR Camera Scan</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Room Name</th>
                        <th>Area (Sqm)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="room-list-body">
                    </tbody>
            </table>

            <div class="total-panel">
                Total Floor Area: <strong id="grand-total">0.00 sqm</strong>
            </div>
        </div>
    </div>


    <div id="camera-view-container" class="hidden">
        <video id="camera-feed" autoplay playsinline></video>
        <div id="crosshair"></div>

        <div id="ui-layer">
            <div class="hud">
                <div><strong>Height (m):</strong> <input type="number" id="cam-height" value="1.4" step="0.1"></div>
                <div id="status" style="margin-top: 5px;">Points logged: 0</div>
                <div id="result" style="font-size: 18px; margin-top: 5px; color: #4caf50;"><strong>Current Area: 0.00 sqm</strong></div>
            </div>

            <div class="hud controls">
                <button id="btn-gyro" class="ar-btn">1. Grant Gyro</button>
                <button id="btn-log" class="ar-btn" disabled>2. Log Corner</button>
                <button id="btn-save" class="ar-btn success hidden">3. Save Room</button>
                <button id="btn-cancel" class="ar-btn danger">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let savedRooms = [];
        let currentPoints = [];
        let currentPitch = 0;
        let currentYaw = 0;
        let streamInstance = null;

        // DOM Elements
        const dashboardView = document.getElementById('dashboard-view');
        const cameraViewContainer = document.getElementById('camera-view-container');
        const video = document.getElementById('camera-feed');
        
        const btnOpenCamera = document.getElementById('btn-open-camera');
        const btnGyro = document.getElementById('btn-gyro');
        const btnLog = document.getElementById('btn-log');
        const btnSave = document.getElementById('btn-save');
        const btnCancel = document.getElementById('btn-cancel');
        
        const txtHeight = document.getElementById('cam-height');
        const txtStatus = document.getElementById('status');
        const txtResult = document.getElementById('result');
        const roomListBody = document.getElementById('room-list-body');
        const grandTotalDisplay = document.getElementById('grand-total');

        let calculatedRunningArea = 0;

        // --- VIEW SWITCHING LOGIC ---
        btnOpenCamera.addEventListener('click', async () => {
            // Show Camera Screen, Hide Dashboard
            dashboardView.classList.add('hidden');
            cameraViewContainer.classList.remove('hidden');
            currentPoints = [];
            calculatedRunningArea = 0;
            txtStatus.innerText = "Points logged: 0";
            txtResult.innerHTML = "<strong>Current Area: 0.00 sqm</strong>";
            btnSave.classList.add('hidden');

            // Boot Camera Stream
            try {
                streamInstance = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = streamInstance;
            } catch (err) {
                alert("Camera initialization error: " + err);
                closeCameraView();
            }
        });

        function closeCameraView() {
            if (streamInstance) {
                streamInstance.getTracks().forEach(track => track.stop());
            }
            cameraViewContainer.classList.add('hidden');
            dashboardView.classList.remove('hidden');
        }

        btnCancel.addEventListener('click', closeCameraView);

        // --- GYROSCOPE INITIALIZATION ---
        btnGyro.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') { attachGyroEngine(); }
                    }).catch(console.error);
            } else {
                attachGyroEngine();
            }
        });

        function attachGyroEngine() {
            window.addEventListener('deviceorientation', (e) => {
                currentYaw = (e.alpha * Math.PI) / 180;   
                currentPitch = (e.beta * Math.PI) / 180; 
                btnLog.disabled = false;
                btnGyro.style.display = 'none';
            });
        }

        // --- MEASUREMENT LOGIC ---
        btnLog.addEventListener('click', () => {
            const h = parseFloat(txtHeight.value);
            const angleOfDepression = (Math.PI / 2) - currentPitch;
            
            if (angleOfDepression <= 0) {
                alert("Aim lower! You must point the crosshair at the floor corners.");
                return;
            }

            const distance = h * Math.tan(angleOfDepression);
            const x = distance * Math.cos(currentYaw);
            const y = distance * Math.sin(currentYaw);

            currentPoints.push({x, y});
            txtStatus.innerText = `Points logged: ${currentPoints.length}`;

            if (currentPoints.length >= 3) {
                calculateRunningArea();
                btnSave.classList.remove('hidden');
            }
        });

        function calculateRunningArea() {
            let area = 0;
            for (let i = 0; i < currentPoints.length; i++) {
                const p1 = currentPoints[i];
                const p2 = currentPoints[(i + 1) % currentPoints.length];
                area += (p1.x * p2.y) - (p2.x * p1.y);
            }
            calculatedRunningArea = Math.abs(area / 2);
            txtResult.innerHTML = `<strong>Current Area: ${calculatedRunningArea.toFixed(2)} sqm</strong>`;
        }

        // --- DATA PERSISTENCE ---
        btnSave.addEventListener('click', () => {
            const roomName = prompt("Enter a name for this room (e.g., Living Room):", `Room ${savedRooms.length + 1}`);
            if (!roomName) return;

            savedRooms.push({
                name: roomName,
                area: calculatedRunningArea
            });

            renderDashboardTable();
            closeCameraView();
        });

        function renderDashboardTable() {
            roomListBody.innerHTML = '';
            let totalSum = 0;

            if (savedRooms.length === 0) {
                roomListBody.innerHTML = `<tr><td colspan="3" class="empty-state">No rooms scanned yet. Tap 'Start AR Camera Scan' to begin.</td></tr>`;
                grandTotalDisplay.innerText = "0.00 sqm";
                return;
            }

            savedRooms.forEach((room, index) => {
                totalSum += room.area;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${room.name}</td>
                    <td>${room.area.toFixed(2)} sqm</td>
                    <td><a class="action-link" onclick="deleteRoom(${index})">Delete</a></td>
                `;
                roomListBody.appendChild(row);
            });

            grandTotalDisplay.innerText = `${totalSum.toFixed(2)} sqm`;
        }

        window.deleteRoom = function(index) {
